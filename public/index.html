<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — DM Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<script src="/js/data.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/util.js"></script>
<script src="/js/nav.js"></script>
<script>Storage.requireAuth(); UI.renderNav({scout:true});</script>

<section style="padding-top:5rem">
  <div class="container">
    <div class="label"><span class="dot"></span> // SCOUT DASHBOARD</div>
    <h1 style="margin-top:.6rem">DM Scout<span class="accent">.</span></h1>
    <p style="color:var(--gray);max-width:620px;margin-top:.8rem">Sistema personale di osservazione calcistica · Paolo Di Muro</p>

    <div class="row row-4" style="margin-top:2rem" id="stats"></div>

    <div style="margin-top:2.5rem;display:flex;gap:.7rem;flex-wrap:wrap">
      <a href="/add-report.html" class="btn btn-primary">+ Nuovo Report</a>
      <a href="/ai-report.html" class="btn btn-secondary">⚡ Generatore AI</a>
      <a href="/database.html" class="btn btn-outline">Database</a>
      <a href="/compare.html" class="btn btn-outline">Compare</a>
      <a href="/map.html" class="btn btn-outline">Mappa</a>
      <button class="btn btn-outline" onclick="Storage.exportJSON()">↓ Export JSON</button>
      <label class="btn btn-outline" style="cursor:pointer">↑ Import JSON<input type="file" accept="application/json" hidden id="imp"></label>
    </div>
  </div>
</section>

<section>
  <div class="container">
    <div class="section-head"><div class="label">// REPORT RECENTI</div></div>
    <div id="recent" class="row row-3"></div>
  </div>
</section>

<section>
  <div class="container">
    <div class="row row-2" style="align-items:start">
      <div>
        <div class="section-head"><div class="label">// VERDETTI</div></div>
        <div id="verdictsChart" class="card-flat"></div>
      </div>
      <div>
        <div class="section-head"><div class="label">// TOP RATED</div></div>
        <div id="topRated" class="card-flat"></div>
      </div>
    </div>
  </div>
</section>

<script>
const all = Storage.getPlayers();
document.getElementById("stats").innerHTML = `
  <div class="stat"><div class="stat-num">${all.length}</div><div class="stat-lbl">Giocatori</div></div>
  <div class="stat"><div class="stat-num">${all.filter(p=>p.verdict_type==='buy').length}</div><div class="stat-lbl">Buy</div></div>
  <div class="stat"><div class="stat-num">${new Set(all.map(p=>p.region)).size}</div><div class="stat-lbl">Regioni</div></div>
  <div class="stat"><div class="stat-num">${new Set(all.map(p=>p.league)).size}</div><div class="stat-lbl">Campionati</div></div>
`;
const recent = [...all].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,6);
document.getElementById("recent").innerHTML = recent.map(p=>`
  <a class="card" href="/player.html?id=${p.id}" style="display:block">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
      <span class="mono" style="color:var(--gray);font-size:.75rem;letter-spacing:2px">#${p.num}</span>
      ${U.verdictBadge(p.verdict_type)}
    </div>
    <h3 style="font-size:1.2rem">${U.escapeHtml(p.name)}</h3>
    <div style="color:var(--gray);font-size:.88rem;margin-top:.2rem">${U.escapeHtml(p.club)} · ${U.escapeHtml(p.position_main)}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem">
      <span class="chip chip-accent">★ ${p.ratings.overall.toFixed(1)}</span>
      <span class="mono" style="color:var(--gray);font-size:.75rem">${p.date||""}</span>
    </div>
  </a>
`).join("");

// verdicts
const buy=all.filter(p=>p.verdict_type==='buy').length;
const mon=all.filter(p=>p.verdict_type==='monitor').length;
const pas=all.filter(p=>p.verdict_type==='pass').length;
const tot=all.length||1;
document.getElementById("verdictsChart").innerHTML = `
  <div class="bar-row"><span class="lab">BUY</span><div class="bar"><div class="bar-fill" style="width:${buy/tot*100}%;background:var(--accent)"></div></div><span class="val">${buy}</span></div>
  <div class="bar-row"><span class="lab">MONITOR</span><div class="bar"><div class="bar-fill" style="width:${mon/tot*100}%;background:var(--orange)"></div></div><span class="val" style="color:var(--orange)">${mon}</span></div>
  <div class="bar-row"><span class="lab">PASS</span><div class="bar"><div class="bar-fill" style="width:${pas/tot*100}%;background:var(--red)"></div></div><span class="val" style="color:var(--red)">${pas}</span></div>
`;

const top=[...all].sort((a,b)=>b.ratings.overall-a.ratings.overall).slice(0,5);
document.getElementById("topRated").innerHTML = top.map((p,i)=>`
  <a href="/player.html?id=${p.id}" style="display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:0.5px solid var(--border)">
    <div style="display:flex;gap:.8rem;align-items:center">
      <span class="mono" style="color:var(--accent);width:24px">#${i+1}</span>
      <div><div style="font-family:var(--font-display);font-weight:700;text-transform:uppercase">${U.escapeHtml(p.name)}</div>
      <div style="color:var(--gray);font-size:.8rem">${U.escapeHtml(p.club)}</div></div>
    </div>
    <span class="chip chip-accent">${p.ratings.overall.toFixed(1)}</span>
  </a>
`).join("");

document.getElementById("imp").onchange = async (e) => {
  if(e.target.files[0]){
    try{ const n = await Storage.importJSON(e.target.files[0]); alert(n+" giocatori importati"); location.reload(); }
    catch(err){ alert("File non valido"); }
  }
};
</script>
</body>
</html>
