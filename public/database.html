<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Database — DM Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<script src="/js/data.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/util.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/nav.js"></script>
<script>UI.renderNav({scout:true});</script>

<section style="padding-top:5rem">
  <div class="container">
    <div class="label" data-i18n="lbl.reports"><span class="dot"></span> // DATABASE GIOCATORI</div>
    <div style="display:flex;justify-content:space-between;align-items:end;flex-wrap:wrap;gap:1rem;margin-top:.6rem">
      <h1>Database<span class="accent">.</span></h1>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap">
        <a href="/add-report.html" class="btn btn-primary" data-i18n="btn.new">+ Nuovo Report</a>
        <button class="btn btn-outline" onclick="Storage.exportJSON()" data-i18n="btn.export">↓ Export JSON</button>
        <label class="btn btn-outline" style="cursor:pointer"><span data-i18n="btn.import">↑ Import JSON</span><input type="file" accept="application/json,.json" hidden id="imp"></label>
      </div>
    </div>

    <div class="filter-bar" style="margin-top:2rem">
      <div class="field"><label data-i18n="lbl.search">Cerca</label><input type="text" id="fSearch" placeholder="Nome, club, lega..."></div>
      <div class="field"><label data-i18n="lbl.position">Posizione</label><select id="fPos"><option value="">Tutte</option></select></div>
      <div class="field"><label data-i18n="lbl.verdict">Verdetto</label><select id="fVerdict"><option value="">Tutti</option><option value="buy">BUY</option><option value="monitor">MONITOR</option><option value="pass">PASS</option></select></div>
      <div class="field"><label data-i18n="lbl.region">Regione</label><select id="fRegion"><option value="">Tutte</option></select></div>
      <div class="field"><label data-i18n="lbl.sort">Ordina per</label><select id="fSort">
        <option value="overall">Overall ↓</option><option value="date">Data ↓</option><option value="age">Età ↑</option><option value="name">Nome A-Z</option>
      </select></div>
    </div>

    <div id="count" class="mono" style="color:var(--gray);font-size:.8rem;letter-spacing:2px;margin:1rem 0 1.5rem"></div>
    <div id="grid" class="row row-3"></div>
  </div>
</section>

<script>
const players = Storage.getPlayers();
const positions = [...new Set(players.map(p=>p.position_main))].sort();
const regions = [...new Set(players.map(p=>p.region).filter(Boolean))].sort();
document.getElementById("fPos").innerHTML += positions.map(p=>`<option>${p}</option>`).join("");
document.getElementById("fRegion").innerHTML += regions.map(r=>`<option>${r}</option>`).join("");

function render(){
  const s = document.getElementById("fSearch").value.toLowerCase();
  const pos = document.getElementById("fPos").value;
  const v = document.getElementById("fVerdict").value;
  const r = document.getElementById("fRegion").value;
  const sort = document.getElementById("fSort").value;
  let arr = players.filter(p=>{
    if(s && !(p.name+p.club+p.league).toLowerCase().includes(s)) return false;
    if(pos && p.position_main!==pos) return false;
    if(v && p.verdict_type!==v) return false;
    if(r && p.region!==r) return false;
    return true;
  });
  arr.sort((a,b)=>{
    if(sort==="overall") return (b.ratings?.overall||0)-(a.ratings?.overall||0);
    if(sort==="age") return (a.age||0)-(b.age||0);
    if(sort==="name") return a.name.localeCompare(b.name);
    return (b.date||"").localeCompare(a.date||"");
  });
  document.getElementById("count").textContent = arr.length+" REPORT";
  document.getElementById("grid").innerHTML = arr.map(p=>U.playerCardHtml(p)).join("") || `<div class="card-flat" style="grid-column:1/-1;text-align:center;color:var(--gray);padding:3rem">Nessun risultato</div>`;
}
["fSearch","fPos","fVerdict","fRegion","fSort"].forEach(id=>document.getElementById(id).addEventListener("input",render));
render();

// Re-render when server sync brings new data
document.addEventListener("dmscout:synced", ()=>{
  players.splice(0, players.length, ...Storage.getPlayers());
  render();
});

document.getElementById("imp").onchange = async (e) => {
  const f = e.target.files[0];
  if(!f) return;
  try{
    const n = await Storage.importJSON(f);
    alert(n+" report importati con successo");
    location.reload();
  }catch(err){
    console.error(err);
    alert("Errore import JSON: "+(err && err.message ? err.message : "file non valido"));
  }finally{ e.target.value=""; }
};
</script>
</body>
</html>
