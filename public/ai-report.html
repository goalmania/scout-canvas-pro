<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generatore AI — DM Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<script src="/js/data.js"></script><script src="/js/storage.js"></script>
<script src="/js/util.js"></script><script src="/js/nav.js"></script>
<script>Storage.requireAuth(); UI.renderNav({scout:true});</script>

<section style="padding-top:5rem"><div class="container" style="max-width:900px">
  <div class="label"><span class="dot"></span> // GENERATORE REPORT AI</div>
  <h1 style="margin-top:.6rem">Generatore<br>AI<span class="accent">.</span></h1>
  <p style="color:var(--gray);margin-top:.5rem">Scrivi liberamente le tue osservazioni. L'AI compilerà tutti i campi del report automaticamente.</p>

  <div class="card-flat" style="margin-top:2rem">
    <div class="field"><label>API Key Anthropic (sk-ant-...)</label>
      <input type="password" id="apiKey" placeholder="La tua API key (salvata solo nel browser)">
      <div style="font-size:.78rem;color:var(--gray);margin-top:.4rem">La key resta in localStorage di questo dispositivo. <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent)">Ottienila qui →</a></div>
    </div>
    <div class="row row-2">
      <div class="field"><label>Nome Giocatore*</label><input id="aiName" type="text" placeholder="Es. Luca Mancini"></div>
      <div class="field"><label>Club (opz.)</label><input id="aiClub" type="text" placeholder="Es. Bari U19"></div>
    </div>
    <div class="field"><label>Osservazioni Libere*</label>
      <textarea id="aiText" rows="10" placeholder="Esempio: 'Ho osservato Luca Mancini, centrocampista del Bari Under 19, classe 2006. Alto 178cm, piede destro. Mezzala offensiva, ottima visione di gioco. Fisicamente acerbo. Potenziale Serie C, valore 40-60 mila euro. Consiglio di monitorarlo.'"></textarea>
    </div>
    <button id="genBtn" class="btn btn-primary btn-block" onclick="generate()">⚡ Genera Report</button>
    <div id="err" class="hidden" style="margin-top:1rem;padding:.8rem 1rem;border:0.5px solid var(--red);background:rgba(255,68,68,.08);border-radius:6px;color:var(--red)"></div>
  </div>

  <div id="preview" class="hidden card-flat" style="margin-top:1.5rem">
    <div class="label" style="margin-bottom:1rem">// ANTEPRIMA</div>
    <div id="prevBody"></div>
    <div style="display:flex;gap:.7rem;margin-top:1.5rem;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="saveDirect()">✓ Salva come Report</button>
      <button class="btn btn-outline" onclick="editFirst()">✏ Modifica prima di salvare</button>
    </div>
  </div>
</div></section>

<script>
let parsed = null;
const apiInput = document.getElementById("apiKey");
apiInput.value = localStorage.getItem("dmscout_api_key")||"";
apiInput.onchange = ()=> localStorage.setItem("dmscout_api_key", apiInput.value);

async function generate(){
  const key = apiInput.value.trim();
  const name = document.getElementById("aiName").value.trim();
  const club = document.getElementById("aiClub").value.trim();
  const text = document.getElementById("aiText").value.trim();
  const err = document.getElementById("err");
  err.classList.add("hidden");
  if(!key){ err.textContent="Inserisci la tua API key Anthropic."; err.classList.remove("hidden"); return; }
  if(!name||!text){ err.textContent="Nome e testo osservazioni richiesti."; err.classList.remove("hidden"); return; }

  const btn = document.getElementById("genBtn");
  btn.textContent="Analisi in corso..."; btn.disabled=true;

  const sys = `Sei un assistente per scout calcistici. Analizza il testo e rispondi SOLO con JSON valido (nessun markdown). Schema: { name, age, birth_year, nationality, flag, club, league, region, position_main, position_code, position_secondary (array), foot, height, weight, tactical_roles (array di {formation, role, role_code, fit_score}), ratings: {technical, tactical, physical, mental, overall} (0-10), skills: {ball_control, passing, dribbling, finishing, defensive_work, tactical_iq, decision_making, aerial, pace, stamina} (0-100), stars: {technique, athleticism, mentality, potential, market_value} (1-5), market: {value_min, value_max, potential, risk, timeline, ready_level}, tags (array), verdict_type ('buy'|'monitor'|'pass'), verdict, observation_type, observation_count, date (oggi YYYY-MM-DD), strengths (array), weaknesses (array), summary, lat, lng }. Posizioni valide: "Portiere","Difensore Centrale","Terzino Sinistro","Terzino Destro","Mediano","Mezzala","Trequartista","Ala Sinistra","Ala Destra","Prima Punta","Seconda Punta". position_code: GK|CB|LB|RB|CDM|CM|CAM|LW|RW|ST|CF.`;

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:sys,
        messages:[{role:"user",content:`Nome: ${name}\nClub: ${club}\n\nOsservazioni:\n${text}`}]})
    });
    if(!res.ok){ throw new Error("API "+res.status); }
    const data = await res.json();
    let txt = data.content[0].text.trim();
    txt = txt.replace(/^```json\s*/,"").replace(/```$/,"").trim();
    parsed = JSON.parse(txt);
    parsed.raw_report = text;
    parsed.id = Storage.generateId(parsed.name||name);
    parsed.num = Storage.nextNum();
    showPreview();
  }catch(e){
    err.textContent="Errore durante l'analisi. Controlla la connessione, la API key o riprova. ("+e.message+")";
    err.classList.remove("hidden");
  } finally {
    btn.textContent="⚡ Genera Report"; btn.disabled=false;
  }
}

function showPreview(){
  const p = parsed;
  document.getElementById("preview").classList.remove("hidden");
  document.getElementById("prevBody").innerHTML = `
    <h2>${U.escapeHtml(p.name)} <span style="color:var(--gray);font-size:1rem">${p.flag||""} ${U.escapeHtml(p.nationality||'')}</span></h2>
    <div style="color:var(--gray);margin-top:.4rem">${U.escapeHtml(p.club||'')} · ${U.escapeHtml(p.position_main||'')} · ${p.age||'?'} anni</div>
    <div style="display:flex;gap:.5rem;margin:.8rem 0;flex-wrap:wrap">${U.verdictBadge(p.verdict_type)} <span class="chip chip-accent">★ ${(p.ratings?.overall||0).toFixed(1)}</span> ${(p.tags||[]).map(t=>`<span class="chip ${U.tagClass(t)}">${t}</span>`).join("")}</div>
    <p style="color:#cfcfcf;line-height:1.6">${U.escapeHtml(p.summary||"")}</p>
    <div class="verdict-box ${p.verdict_type}" style="margin-top:1rem"><strong>${(p.verdict_type||'').toUpperCase()}</strong><p style="margin-top:.4rem">${U.escapeHtml(p.verdict||"")}</p></div>
  `;
  document.getElementById("preview").scrollIntoView({behavior:"smooth"});
}
function saveDirect(){ Storage.savePlayer(parsed); location.href="/player.html?id="+parsed.id; }
function editFirst(){ sessionStorage.setItem("dmscout_ai_prefill", JSON.stringify(parsed)); location.href="/add-report.html"; }
</script>
</body></html>
