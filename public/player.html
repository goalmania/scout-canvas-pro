<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player — DM Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
@media print{
  .pdf-header{display:block!important;border-bottom:2px solid #5a8a00;padding-bottom:1rem;margin-bottom:2rem}
}
.pdf-header{display:none}
</style>
</head>
<body>
<script src="/js/data.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/util.js"></script>
<script src="/js/nav.js"></script>
<script>Storage.requireAuth(); UI.renderNav({scout:true});</script>

<div id="root" style="padding-top:5rem"></div>

<script>
const id = new URLSearchParams(location.search).get("id");
const p = Storage.getPlayer(id);
if(!p){ document.getElementById("root").innerHTML = `<div class="container"><h1>Non trovato</h1><a href="/database.html" class="btn btn-primary">← Database</a></div>`; }
else render();

function render(){
  const skillLabels = {ball_control:"Ball Control",passing:"Passaggio",dribbling:"Dribbling",finishing:"Finalizzazione",defensive_work:"Difensiva",tactical_iq:"Tattica IQ",decision_making:"Decision",aerial:"Aerei",pace:"Velocità",stamina:"Resistenza"};
  const root = document.getElementById("root");
  root.innerHTML = `
  <div class="container">
    <div class="pdf-header">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.5rem;color:#5a8a00">DM SCOUT REPORT</div>
      <div style="font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:2px;color:#666">Paolo Di Muro · Football Scout · ${new Date().toLocaleDateString('it-IT')}</div>
    </div>

    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;align-items:end;margin-bottom:2rem" class="no-print">
      <a href="/database.html" style="color:var(--gray);font-family:var(--font-mono);font-size:.8rem;letter-spacing:2px">← DATABASE</a>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="localStorage.setItem('dmscout_compare_id','${p.id}');location.href='/compare.html'">⇄ Compare</button>
        <a href="/edit-report.html?id=${p.id}" class="btn btn-outline btn-sm">✏ Edit</a>
        <button class="btn btn-primary btn-sm" onclick="window.print()">↓ PDF</button>
      </div>
    </div>

    <!-- HEADER -->
    <div class="card-flat" style="display:grid;grid-template-columns:auto 1fr auto;gap:2rem;align-items:center;margin-bottom:1.5rem">
      ${p.photo ? `<img src="${p.photo}" class="photo-square" alt="${U.escapeHtml(p.name)}">` : `<div class="photo-square">${p.name.split(' ').map(s=>s[0]).join('').slice(0,2)}</div>`}
      <div>
        <div class="mono" style="color:var(--gray);font-size:.75rem;letter-spacing:2px">#${p.num} · ${p.flag||''} ${U.escapeHtml(p.nationality||'')}</div>
        <h1 style="margin:.3rem 0">${U.escapeHtml(p.name)}</h1>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">
          <span class="chip chip-accent">${U.escapeHtml(p.position_main)}</span>
          ${(p.position_secondary||[]).map(s=>`<span class="chip">${U.escapeHtml(s)}</span>`).join("")}
          ${U.verdictBadge(p.verdict_type)}
        </div>
        <div style="color:var(--gray);font-size:.95rem;margin-top:.6rem">${U.escapeHtml(p.club)} · ${U.escapeHtml(p.league||'')}</div>
      </div>
      <div style="text-align:right">
        <div class="stat-num" style="font-size:3.5rem;color:var(--accent)">${p.ratings.overall.toFixed(1)}</div>
        <div class="stat-lbl">Overall</div>
      </div>
    </div>

    <!-- ANAGRAFICA -->
    <div class="row row-4" style="margin-bottom:1.5rem">
      <div class="stat"><div class="stat-num" style="font-size:1.8rem">${p.age}</div><div class="stat-lbl">Età · ${p.birth_year}</div></div>
      <div class="stat"><div class="stat-num" style="font-size:1.8rem">${p.height||'—'}<span style="font-size:.9rem">cm</span></div><div class="stat-lbl">Altezza</div></div>
      <div class="stat"><div class="stat-num" style="font-size:1.8rem">${p.weight||'—'}<span style="font-size:.9rem">kg</span></div><div class="stat-lbl">Peso</div></div>
      <div class="stat"><div class="stat-num" style="font-size:1.8rem">${U.escapeHtml(p.foot||'—')}</div><div class="stat-lbl">Piede</div></div>
    </div>

    <!-- RADAR + RATINGS -->
    <div class="row row-2" style="margin-bottom:1.5rem;align-items:start">
      <div class="card-flat">
        <div class="label" style="margin-bottom:1rem">// VALUTAZIONI</div>
        <canvas id="radar" width="420" height="420" style="max-width:100%;height:auto"></canvas>
      </div>
      <div class="card-flat">
        <div class="label" style="margin-bottom:1rem">// SKILLS</div>
        ${Object.keys(skillLabels).map(k=>`
          <div class="bar-row"><span class="lab">${skillLabels[k]}</span><div class="bar"><div class="bar-fill" style="width:${p.skills[k]||0}%"></div></div><span class="val">${p.skills[k]||0}</span></div>
        `).join("")}
      </div>
    </div>

    <!-- STARS -->
    <div class="card-flat" style="margin-bottom:1.5rem">
      <div class="label" style="margin-bottom:1rem">// STELLE</div>
      <div class="row row-3">
        ${["technique","athleticism","mentality","potential","market_value"].map(k=>`
          <div><div style="font-family:var(--font-mono);font-size:.75rem;letter-spacing:2px;color:var(--gray);margin-bottom:.3rem">${({technique:"TECNICA",athleticism:"ATLETISMO",mentality:"MENTALITÀ",potential:"POTENZIALE",market_value:"VALORE"})[k]}</div>${U.starsRow(p.stars[k]||0)}</div>
        `).join("")}
      </div>
    </div>

    <!-- TACTICAL ROLES -->
    <div class="card-flat" style="margin-bottom:1.5rem">
      <div class="label" style="margin-bottom:1rem">// RUOLI TATTICI</div>
      <div class="row row-2">
        ${(p.tactical_roles||[]).map(r=>`
          <div style="padding:1rem;border:0.5px solid var(--border);border-radius:6px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
              <span class="chip chip-accent">${r.formation}</span>
              <span class="mono" style="color:var(--accent);font-weight:700">${r.fit_score}%</span>
            </div>
            <div style="font-family:var(--font-display);font-weight:700;text-transform:uppercase">${U.escapeHtml(r.role)}</div>
            <div class="bar" style="margin-top:.6rem"><div class="bar-fill" style="width:${r.fit_score}%"></div></div>
          </div>
        `).join("")}
      </div>
    </div>

    <!-- MARKET -->
    <div class="card-flat" style="margin-bottom:1.5rem">
      <div class="label" style="margin-bottom:1rem">// MERCATO</div>
      <div class="row row-4">
        <div><div class="label">Range Valore</div><div style="font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--accent)">${U.fmtMoney(p.market.value_min)} – ${U.fmtMoney(p.market.value_max)}</div></div>
        <div><div class="label">Potenziale</div><div style="font-family:var(--font-display);font-size:1.2rem;font-weight:700">${U.escapeHtml(p.market.potential||'—')}</div></div>
        <div><div class="label">Rischio</div><div style="font-family:var(--font-display);font-size:1.2rem;font-weight:700">${U.escapeHtml(p.market.risk||'—')}</div></div>
        <div><div class="label">Pronto per</div><div style="font-family:var(--font-display);font-size:1.2rem;font-weight:700">${U.escapeHtml(p.market.ready_level||'—')}</div></div>
      </div>
      <div style="margin-top:.8rem;color:var(--gray);font-size:.9rem">Timeline: ${U.escapeHtml(p.market.timeline||'—')}</div>
    </div>

    <!-- TAGS -->
    ${(p.tags||[]).length?`<div class="card-flat" style="margin-bottom:1.5rem"><div class="label" style="margin-bottom:.7rem">// TAGS</div>${U.tags(p)}</div>`:''}

    <!-- ANALYSIS -->
    <div class="row row-2" style="margin-bottom:1.5rem;align-items:start">
      <div class="card-flat">
        <div class="label" style="margin-bottom:.7rem;color:var(--accent)">// PUNTI DI FORZA</div>
        <ul style="list-style:none;display:flex;flex-direction:column;gap:.5rem">
          ${(p.strengths||[]).map(s=>`<li style="padding:.5rem .8rem;border-left:2px solid var(--accent);background:var(--accent-dim)">${U.escapeHtml(s)}</li>`).join("")}
        </ul>
      </div>
      <div class="card-flat">
        <div class="label" style="margin-bottom:.7rem;color:var(--orange)">// AREE DI MIGLIORAMENTO</div>
        <ul style="list-style:none;display:flex;flex-direction:column;gap:.5rem">
          ${(p.weaknesses||[]).map(s=>`<li style="padding:.5rem .8rem;border-left:2px solid var(--orange);background:rgba(255,140,0,.08)">${U.escapeHtml(s)}</li>`).join("")}
        </ul>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="card-flat" style="margin-bottom:1.5rem">
      <div class="label" style="margin-bottom:.7rem">// ANALISI</div>
      <p style="line-height:1.7">${U.escapeHtml(p.summary||'')}</p>
    </div>

    <!-- VERDICT -->
    <div class="verdict-box ${p.verdict_type}">
      <div class="label" style="margin-bottom:.5rem">// VERDETTO FINALE</div>
      <h3 style="font-size:1.6rem">${(p.verdict_type||'').toUpperCase()}</h3>
      <p style="margin-top:.6rem;line-height:1.6">${U.escapeHtml(p.verdict||'')}</p>
    </div>

    <div class="card-flat" style="margin-top:1.5rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div><div class="label">Data Osservazione</div><div class="mono">${U.escapeHtml(p.date||'—')}</div></div>
      <div><div class="label">Tipo</div><div class="mono">${U.escapeHtml(p.observation_type||'—')}</div></div>
      <div><div class="label">N° Osservazioni</div><div class="mono">${p.observation_count||0}</div></div>
      ${p.video_url?`<div><div class="label">Video</div><a href="${p.video_url}" target="_blank" class="accent mono">▶ Guarda</a></div>`:''}
    </div>
  </div>`;

  // radar
  const r = p.ratings;
  U.drawRadar(document.getElementById("radar"), {
    labels:["Tecnica","Tattica","Fisico","Mentalità","Overall"],
    datasets:[{values:[r.technical,r.tactical,r.physical,r.mental,r.overall],fill:"rgba(200,240,0,0.18)",stroke:"#c8f000"}]
  },{max:10});
}
</script>
</body>
</html>
