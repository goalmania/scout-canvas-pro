<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mappa — DM Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
#map{height:600px;width:100%;border:0.5px solid var(--border);border-radius:var(--radius);background:#0a0a0a}
.leaflet-container{background:#0a1a0a;font-family:var(--font-mono)}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#111;color:#fff;border:0.5px solid var(--accent);border-radius:6px}
.leaflet-popup-content{margin:.7rem .9rem;font-family:var(--font-body)}
.leaflet-popup-content a{color:var(--accent)}
.leaflet-control-zoom a{background:#111;color:var(--accent);border:0.5px solid var(--border)}
.leaflet-control-zoom a:hover{background:var(--accent);color:#000}
.dm-marker{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:2px solid #000;font-family:var(--font-mono);font-size:.7rem;font-weight:700;box-shadow:0 0 12px rgba(0,0,0,.6)}
.dm-marker.buy{background:#c8f000;color:#000}
.dm-marker.monitor{background:#ff8c00;color:#000}
.dm-marker.pass{background:#666;color:#fff}
.region-label{background:transparent;border:none;color:#fff;font-family:var(--font-mono);font-size:.72rem;font-weight:700;text-shadow:0 0 4px #000,0 0 4px #000;text-align:center;white-space:nowrap;pointer-events:none}
.region-label .cnt{display:inline-block;background:var(--accent);color:#000;padding:1px 6px;border-radius:3px;margin-left:4px}
.region-list{max-height:600px;overflow-y:auto}
@media(max-width:768px){#map{height:480px}}
</style>
</head>
<body>
<script src="/js/data.js"></script><script src="/js/storage.js"></script>
<script src="/js/util.js"></script><script src="/js/i18n.js"></script>
<script src="/js/nav.js"></script>
<script>UI.renderNav({scout:true});</script>

<section style="padding-top:5rem"><div class="container">
  <div class="label"><span class="dot"></span> // MAPPA GIOCATORI</div>
  <h1 style="margin-top:.6rem">Mappa<span class="accent">.</span></h1>
  <div id="stats" class="mono" style="color:var(--gray);font-size:.85rem;letter-spacing:2px;margin-top:.8rem"></div>

  <div style="display:flex;gap:.5rem;margin-top:1.5rem;flex-wrap:wrap">
    <button class="btn btn-primary" id="bWorld">🌍 Mondo (per nazionalità)</button>
    <button class="btn btn-outline" id="bIta">🇮🇹 Italia (per regione)</button>
    <select id="fVerd" class="btn btn-outline" style="padding:.6rem 1rem">
      <option value="">Tutti i verdetti</option><option value="buy">BUY</option><option value="monitor">MONITOR</option><option value="pass">PASS</option>
    </select>
  </div>

  <div class="row row-2" style="margin-top:1.5rem;align-items:start;gap:1rem">
    <div id="map"></div>
    <div class="card-flat region-list" id="sideList"></div>
  </div>

  <div style="display:flex;gap:1rem;margin-top:1rem;font-size:.8rem;color:var(--gray)">
    <span><span style="display:inline-block;width:10px;height:10px;background:#c8f000;border-radius:50%"></span> BUY</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#ff8c00;border-radius:50%"></span> MONITOR</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#666;border-radius:50%"></span> PASS</span>
  </div>
</div></section>

<script>
const all = Storage.getPlayers();
document.getElementById("stats").textContent =
  `${all.length} GIOCATORI · ${new Set(all.map(p=>p.nationality||"?")).size} NAZIONI · ${new Set(all.filter(p=>p.region&&p.region!=="Estero").map(p=>p.region)).size} REGIONI ITALIA`;

// Leaflet map with dark tiles
const map = L.map("map",{worldCopyJump:true,minZoom:2,maxZoom:18,zoomControl:true}).setView([42.5,12.5],5);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; <a href="https://carto.com">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>',
  subdomains:"abcd", maxZoom:19
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let regionLayer = L.layerGroup().addTo(map);
let view = "world";
let italyGeo = null;

document.getElementById("bWorld").onclick = ()=>{ view="world"; document.getElementById("bWorld").classList.replace("btn-outline","btn-primary"); document.getElementById("bIta").classList.replace("btn-primary","btn-outline"); render(); };
document.getElementById("bIta").onclick = ()=>{ view="ita"; document.getElementById("bIta").classList.replace("btn-outline","btn-primary"); document.getElementById("bWorld").classList.replace("btn-primary","btn-outline"); render(); };
document.getElementById("fVerd").onchange = render;

function dmIcon(verdict, label){
  const v = verdict||"pass";
  return L.divIcon({className:"", html:`<div class="dm-marker ${v}">${label||""}</div>`, iconSize:[28,28], iconAnchor:[14,14]});
}

function popupHtml(p){
  return `<div style="min-width:180px">
    <div style="font-family:var(--font-display);font-weight:700;font-size:1.05rem;text-transform:uppercase">${U.escapeHtml(p.name)}</div>
    <div style="color:#aaa;font-size:.8rem;margin:.2rem 0">${p.flag||""} ${U.escapeHtml(p.nationality||"")} · ${U.escapeHtml(p.club||"")}</div>
    <div style="display:flex;gap:.3rem;margin:.4rem 0;flex-wrap:wrap">
      <span class="chip ${p.verdict_type==='buy'?'chip-accent':p.verdict_type==='monitor'?'chip-orange':'chip-red'}">${(p.verdict_type||'').toUpperCase()}</span>
      <span class="chip chip-accent">★ ${(p.ratings?.overall||0).toFixed(1)}</span>
    </div>
    <a href="/player.html?id=${p.id}" style="font-family:var(--font-mono);font-size:.78rem;letter-spacing:1px">APRI SCHEDA →</a>
  </div>`;
}

function clearLayers(){
  markerLayer.clearLayers();
  regionLayer.clearLayers();
}

async function render(){
  clearLayers();
  const v = document.getElementById("fVerd").value;
  const arr = all.filter(p=>!v||p.verdict_type===v);
  if(view==="world") renderWorld(arr);
  else await renderItaly(arr);
}

function renderWorld(arr){
  // group by nationality, fan out close coords
  const byNat = {};
  arr.forEach(p=>{ const k=p.nationality||"?"; (byNat[k]=byNat[k]||[]).push(p); });
  const list = [];
  Object.keys(byNat).forEach(nat=>{
    const players = byNat[nat];
    list.push({nat,players});
    players.forEach((p,i)=>{
      if(typeof p.lat!=="number"||typeof p.lng!=="number") return;
      const off = i===0?0:0.15;
      const ang = (i/players.length)*Math.PI*2;
      const lat = p.lat + Math.sin(ang)*off;
      const lng = p.lng + Math.cos(ang)*off;
      const m = L.marker([lat,lng],{icon:dmIcon(p.verdict_type, (p.ratings?.overall||0).toFixed(1))});
      m.bindPopup(popupHtml(p));
      m.addTo(markerLayer);
    });
  });
  map.setView([30,10],3);

  // side panel: by nationality
  const sl = document.getElementById("sideList");
  sl.innerHTML = `<div class="label" style="margin-bottom:1rem">// PER NAZIONALITÀ · ${arr.length}</div>` +
    list.sort((a,b)=>b.players.length-a.players.length).map(g=>`
      <div style="padding:.7rem 0;border-bottom:0.5px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
          <strong>${g.players[0].flag||""} ${U.escapeHtml(g.nat)}</strong>
          <span class="chip chip-accent">${g.players.length}</span>
        </div>
        ${g.players.map(p=>`<a href="/player.html?id=${p.id}" style="display:block;padding:.25rem 0;color:var(--gray);font-size:.85rem">› ${U.escapeHtml(p.name)} <span style="color:var(--gray-2)">${U.escapeHtml(p.club||"")}</span></a>`).join("")}
      </div>`).join("");
}

async function loadItalyGeo(){
  if(italyGeo) return italyGeo;
  const res = await fetch("https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson");
  italyGeo = await res.json();
  return italyGeo;
}

async function renderItaly(arr){
  // counts by region
  const counts = {};
  arr.filter(p=>p.region && p.region!=="Estero").forEach(p=>{ counts[p.region]=(counts[p.region]||0)+1; });
  const max = Math.max(1,...Object.values(counts));

  function colorFor(c){
    if(!c) return "#1a1a1a";
    const t = c/max;
    // interpolate from #2a3a00 to accent #c8f000
    const r = Math.round(0x2a + (0xc8-0x2a)*t);
    const g = Math.round(0x3a + (0xf0-0x3a)*t);
    return `rgb(${r},${g},0)`;
  }

  let geo;
  try { geo = await loadItalyGeo(); }
  catch(e){
    document.getElementById("sideList").innerHTML = `<div style="color:var(--red);padding:1rem">Errore caricamento mappa Italia: ${e.message}</div>`;
    return;
  }

  // normalize region names
  const norm = s => (s||"").toLowerCase().replace(/[^a-z]/g,"");
  const countByNorm = {};
  Object.keys(counts).forEach(k=>{ countByNorm[norm(k)] = counts[k]; });

  const layer = L.geoJSON(geo,{
    style: f => {
      const name = f.properties.reg_name || f.properties.name || "";
      const c = countByNorm[norm(name)] || 0;
      return { color:"#c8f000", weight: c?1.5:0.5, opacity: c?0.9:0.4, fillColor: colorFor(c), fillOpacity: c?0.55:0.15 };
    },
    onEachFeature: (f, lyr) => {
      const name = f.properties.reg_name || f.properties.name || "";
      const c = countByNorm[norm(name)] || 0;
      lyr.bindTooltip(`<strong>${name}</strong>${c?` · ${c} giocatori`:''}`,{sticky:true,className:"region-label"});
      lyr.on("click", ()=>{
        // find original key
        const origKey = Object.keys(counts).find(k=>norm(k)===norm(name));
        showRegion(origKey||name, arr);
        map.fitBounds(lyr.getBounds(),{padding:[20,20]});
      });
      lyr.on("mouseover", ()=> lyr.setStyle({weight:2.5,fillOpacity:0.75}));
      lyr.on("mouseout", ()=> layer.resetStyle(lyr));
    }
  }).addTo(regionLayer);

  // also add player markers in Italy
  arr.filter(p=>p.region && p.region!=="Estero" && typeof p.lat==="number").forEach(p=>{
    const m = L.marker([p.lat,p.lng],{icon:dmIcon(p.verdict_type,(p.ratings?.overall||0).toFixed(1))});
    m.bindPopup(popupHtml(p));
    m.addTo(markerLayer);
  });

  map.fitBounds(layer.getBounds(),{padding:[10,10]});
  showRegion("", arr);
}

function showRegion(region, arr){
  const list = arr.filter(p=>!region||p.region===region);
  const sl = document.getElementById("sideList");
  sl.innerHTML = `<div class="label" style="margin-bottom:1rem">// ${region?region.toUpperCase():'TUTTE LE REGIONI'} · ${list.length}</div>` +
    `<button class="btn btn-outline btn-sm" onclick="showRegion('', filteredAll())" style="margin-bottom:.8rem">Mostra tutte</button>` +
    (list.length?list.map(p=>`
      <a href="/player.html?id=${p.id}" style="display:block;padding:.7rem 0;border-bottom:0.5px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${U.escapeHtml(p.name)}</strong><div style="color:var(--gray);font-size:.78rem">${U.escapeHtml(p.region||"")} · ${U.escapeHtml(p.club||"")}</div></div>
          <div style="display:flex;gap:.4rem;align-items:center">${U.verdictBadge(p.verdict_type)}<span class="chip chip-accent">${(p.ratings?.overall||0).toFixed(1)}</span></div>
        </div>
      </a>`).join(""):'<div style="color:var(--gray);text-align:center;padding:2rem">Nessun giocatore in questa regione</div>');
}
window.showRegion = showRegion;
window.filteredAll = ()=>{ const v=document.getElementById("fVerd").value; return all.filter(p=>!v||p.verdict_type===v); };

render();
</script>
</body></html>
